name: Release
on:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  release:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4
      - name: Build app bundle
        run: ./build.sh
      - name: Zip
        run: ditto -c -k --keepParent "/Applications/Claude Dash.app" "Claude-Dash-${GITHUB_REF_NAME#v}.zip"
      - name: Create release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "$GITHUB_REF_NAME" "Claude-Dash-${GITHUB_REF_NAME#v}.zip" \
            --title "Claude Dash $GITHUB_REF_NAME" --generate-notes \
            --notes "**Install:** unzip, drag Claude Dash.app into /Applications, then run \`xattr -dr com.apple.quarantine \"/Applications/Claude Dash.app\"\` (the app is not notarized). Building from source avoids this — see the README."
