name: CI
on:
  push:
    branches: [main]
  pull_request:

jobs:
  build-and-test:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
      - name: Bootstrap pinned Sparkle framework
        run: ./Scripts/bootstrap-sparkle.sh
      - name: Build universal app bundle
        env:
          CLAUDE_DASH_APP_PATH: ${{ runner.temp }}/Claude Dash.app
        run: ./build.sh
      - name: Verify embedded framework and signatures
        run: ./Scripts/verify-sparkle-bundle.sh "${RUNNER_TEMP}/Claude Dash.app"
      - name: Run tests
        run: ./Scripts/test.sh
